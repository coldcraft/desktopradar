<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#2b2d2a; display:flex; align-items:center; justify-content:center; height:100vh; }
  svg { width: 820px; height: 640px; }
  .stencil { font-family:"Arial Narrow","Impact",sans-serif; font-weight:700; letter-spacing:2px; }
  .lcd { font-family:Consolas,monospace; font-weight:700; }
</style></head><body>
<svg viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8ccd0"/><stop offset=".28" stop-color="#9aa0a6"/><stop offset=".55" stop-color="#7e848b"/><stop offset=".78" stop-color="#8d939a"/><stop offset="1" stop-color="#aeb3b8"/>
    </linearGradient>
    <linearGradient id="drawerFace" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6d7149"/><stop offset=".5" stop-color="#565a39"/><stop offset="1" stop-color="#454930"/></linearGradient>
    <linearGradient id="drawerFaceH" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6d7149"/><stop offset=".5" stop-color="#565a39"/><stop offset="1" stop-color="#454930"/></linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6e9ec"/><stop offset=".5" stop-color="#a7adb3"/><stop offset=".55" stop-color="#7c8288"/><stop offset="1" stop-color="#c2c7cc"/></linearGradient>
    <linearGradient id="steelH" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#e6e9ec"/><stop offset=".5" stop-color="#a7adb3"/><stop offset=".55" stop-color="#7c8288"/><stop offset="1" stop-color="#c2c7cc"/></linearGradient>
    <radialGradient id="phos" cx=".5" cy=".44" r=".6"><stop offset="0" stop-color="#0e2c16"/><stop offset=".6" stop-color="#05160b"/><stop offset="1" stop-color="#010704"/></radialGradient>
    <radialGradient id="glare" cx=".36" cy=".26" r=".55"><stop offset="0" stop-color="rgba(255,255,255,.26)"/><stop offset="1" stop-color="rgba(255,255,255,0)"/></radialGradient>
    <radialGradient id="bezel" cx=".4" cy=".35" r=".7"><stop offset="0" stop-color="#d8dce0"/><stop offset=".5" stop-color="#8f959b"/><stop offset="1" stop-color="#565b61"/></radialGradient>
    <linearGradient id="trayFloor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#202219"/><stop offset="1" stop-color="#15170f"/></linearGradient>
  </defs>

  <!-- ===== NEAR drawer: pulled out from UNDER the right edge (top-down tray) ===== -->
  <g>
    <ellipse cx="650" cy="255" rx="180" ry="20" fill="#000" opacity="0.28"/>
    <rect x="470" y="95" width="330" height="150" rx="3" fill="url(#drawerFace)" stroke="#20220f" stroke-width="1.5"/>
    <rect x="470" y="95" width="330" height="5" fill="rgba(255,255,255,.14)"/>
    <rect x="470" y="240" width="330" height="5" fill="rgba(0,0,0,.4)"/>
    <rect x="486" y="108" width="266" height="124" rx="2" fill="url(#trayFloor)"/>
    <rect x="486" y="108" width="266" height="6" fill="#000" opacity=".5"/>
    <g class="lcd" font-size="11" fill="#bfe8cd">
      <g><circle cx="497" cy="126" r="3.4" fill="#ff4839"/><text x="507" y="130">N911CD</text><rect x="560" y="120" width="42" height="12" rx="6" fill="#3a2a10" stroke="#ffb43a"/><text x="565" y="130" font-size="8" fill="#ffe0a0">LEGEND</text><text x="712" y="130" fill="#9aa0a6">15 km</text></g>
      <g transform="translate(0,22)"><circle cx="497" cy="126" r="3.4" fill="#6a747b"/><text x="507" y="130">UAL1381</text><text x="560" y="130" fill="#8fd9a8">United · B738</text><text x="716" y="130" fill="#9aa0a6">8 km</text></g>
      <g transform="translate(0,44)"><circle cx="497" cy="126" r="3.4" fill="#4aa8e0"/><text x="507" y="130">N796AB</text><rect x="560" y="120" width="30" height="12" rx="6" fill="#12293a" stroke="#4aa8e0"/><text x="565" y="130" font-size="8" fill="#b3e2ff">RARE</text><text x="712" y="130" fill="#9aa0a6">12 km</text></g>
      <g transform="translate(0,66)"><circle cx="497" cy="126" r="3.4" fill="#9df5b8"/><text x="507" y="130">N4872D</text><text x="560" y="130" fill="#8fd9a8">C172 · 3 km E</text><text x="716" y="130" fill="#9aa0a6">3 km</text></g>
    </g>
    <!-- drawer front on the outer (right) edge: steel pull + vertical stencil label to its left -->
    <rect x="758" y="95" width="42" height="150" fill="url(#drawerFace)" stroke="#20220f" stroke-width="1"/>
    <rect x="758" y="95" width="4" height="150" fill="rgba(255,255,255,.15)"/>
    <rect x="784" y="130" width="9" height="80" rx="4.5" fill="url(#steel)" stroke="#4a4f55" stroke-width=".8"/>
    <rect x="787" y="130" width="4" height="80" fill="rgba(255,255,255,.35)"/>
    <text class="stencil" transform="translate(772,170) rotate(-90)" text-anchor="middle" font-size="16" fill="#20220f" opacity=".85">NEAR</text>
    <g fill="#9a9a90" opacity=".8"><path d="M474,100 l8,2 l-3,4 l-7,-2 z"/><circle cx="795" cy="215" r="1.6"/><circle cx="760" cy="120" r="1.3"/></g>
  </g>

  <!-- ===== STARS drawer: pulled out from UNDER the bottom edge (ribbon rack) ===== -->
  <g>
    <ellipse cx="360" cy="600" rx="200" ry="20" fill="#000" opacity="0.28"/>
    <rect x="200" y="400" width="320" height="190" rx="3" fill="url(#drawerFaceH)" stroke="#20220f" stroke-width="1.5"/>
    <rect x="200" y="400" width="5" height="190" fill="rgba(255,255,255,.14)"/>
    <rect x="216" y="415" width="288" height="128" rx="2" fill="url(#trayFloor)"/>
    <rect x="216" y="415" width="288" height="6" fill="#000" opacity=".5"/>
    <!-- ribbon rack -->
    <g stroke="#8a6a20" stroke-width="1">
      <g transform="translate(228,426)"><rect width="60" height="15" fill="#35507a"/><rect x="22" width="16" height="15" fill="#c9a227"/></g>
      <g transform="translate(300,426)"><rect width="60" height="15" fill="#3f7a4a"/><rect x="24" width="12" height="15" fill="#b23b3b"/></g>
      <g transform="translate(372,426)"><rect width="60" height="15" fill="#6a3f7a"/><rect x="18" width="8" height="15" fill="#eee"/><rect x="34" width="8" height="15" fill="#eee"/></g>
      <g transform="translate(444,426)"><rect width="60" height="15" fill="#b0472f"/><rect x="26" width="10" height="15" fill="#2f4a7a"/></g>
      <g transform="translate(228,450)"><rect width="60" height="15" fill="#c9a227"/><rect x="24" width="12" height="15" fill="#a02020"/></g>
      <g transform="translate(300,450)"><rect width="60" height="15" fill="#2f6a7a"/><rect x="22" width="16" height="15" fill="#f0f0f0"/></g>
    </g>
    <g fill="#26281c" stroke="#101208" stroke-width="1">
      <rect x="372" y="450" width="60" height="15"/><rect x="444" y="450" width="60" height="15"/>
      <rect x="228" y="474" width="60" height="15"/><rect x="300" y="474" width="60" height="15"/><rect x="372" y="474" width="60" height="15"/><rect x="444" y="474" width="60" height="15"/>
    </g>
    <!-- drawer front on the outer (bottom) edge: steel pull + stencil label above it -->
    <rect x="200" y="548" width="320" height="42" fill="url(#drawerFaceH)" stroke="#20220f" stroke-width="1"/>
    <rect x="200" y="548" width="320" height="4" fill="rgba(255,255,255,.15)"/>
    <rect x="320" y="568" width="80" height="9" rx="4.5" fill="url(#steelH)" stroke="#4a4f55" stroke-width=".8"/>
    <rect x="320" y="568" width="80" height="4" fill="rgba(255,255,255,.35)"/>
    <text class="stencil" x="258" y="576" text-anchor="middle" font-size="16" fill="#20220f" opacity=".85">STARS</text>
    <g fill="#9a9a90" opacity=".8"><path d="M205,405 l8,2 l-3,4 l-7,-2 z"/><circle cx="490" cy="560" r="1.5"/><circle cx="240" cy="500" r="1.3"/></g>
  </g>

  <!-- ===== THE GADGET (unchanged) — drawn on top so the drawers emerge from UNDER it ===== -->
  <g>
    <rect x="188" y="46" width="336" height="378" rx="20" fill="url(#alu)" stroke="#3d4147" stroke-width="1.5"/>
    <rect x="196" y="54" width="320" height="6" rx="3" fill="rgba(255,255,255,.4)"/>
    <g fill="#d7dade" stroke="#565b61" stroke-width="1"><circle cx="206" cy="64" r="6"/><circle cx="506" cy="64" r="6"/><circle cx="206" cy="406" r="6"/><circle cx="506" cy="406" r="6"/></g>
    <!-- scope -->
    <g transform="translate(356,214)">
      <circle r="146" fill="url(#bezel)"/><circle r="132" fill="#33373c"/><circle r="126" fill="url(#phos)"/>
      <circle r="86" fill="none" stroke="rgba(90,220,140,.2)"/><circle r="43" fill="none" stroke="rgba(90,220,140,.2)"/>
      <line x1="-126" y1="0" x2="126" y2="0" stroke="rgba(90,220,140,.14)"/><line x1="0" y1="-126" x2="0" y2="126" stroke="rgba(90,220,140,.14)"/>
      <path d="M0,0 L118,-42 A126,126 0 0 1 60,110 Z" fill="rgba(110,255,170,.16)"/>
      <line x2="122" y2="-44" stroke="rgba(190,255,215,.85)" stroke-width="2"/>
      <path d="M-40,-30 l6,-8 l7,6 z" fill="#ffb43a"/><path d="M28,20 l6,-8 l7,6 z" fill="#7fe0a0"/><circle cx="-14" cy="30" r="3" fill="#ff5546"/>
      <circle r="126" fill="url(#glare)"/>
    </g>
    <!-- coarse controls + lcd hint -->
    <rect x="236" y="362" width="240" height="20" rx="4" fill="#0f2213" stroke="#2a2e33"/><text class="lcd" x="248" y="376" font-size="11" fill="#9df5b8">FEED ADSB.LOL</text><text class="lcd" x="410" y="376" font-size="11" fill="#9df5b8">277 AC</text>
    <text class="lcd" x="356" y="26" font-size="12" fill="#3a3e44" text-anchor="middle" letter-spacing="4">ADS-B RADAR</text>
  </g>
</svg>
</body></html>
